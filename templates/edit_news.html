{% extends 'base.html' %}

{% block title %}Редактировать новость{% endblock %}

{% block content %}
    <h2>Редактировать новость</h2>
    <form action="{{ url_for('edit_news', news_id=news.id) }}" method="POST" enctype="multipart/form-data">
        <label for="title">Заголовок:</label>
        <input type="text" name="title" value="{{ news.title }}" required>
        
        <label for="content">Текст новости:</label>
        <textarea name="content" rows="5" required>{{ news.content }}</textarea>
        
        <label for="preview_image">Новое изображение (необязательно):</label>
        <input type="file" name="preview_image">
        
        <button type="submit">Сохранить изменения</button>
    </form>
{% endblock %}
